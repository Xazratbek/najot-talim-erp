{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block page_title %}Teacher Panel{% endblock page_title %}</title>
    <link rel="stylesheet" href="{% static 'css/teacher.css' %}">
</head>
<body class="teacher-body">
<div class="teacher-layout">
    <aside class="teacher-sidebar">
        <div class="brand">Najot Ta'lim</div>
        <nav>
            <a class="nav-item {% if 'teacher-groups' in request.resolver_match.url_name or 'teacher_group_detail' == request.resolver_match.url_name %}active{% endif %}" href="{% url 'teacher-groups' %}">Guruhlar</a>
            <a class="nav-item {% if request.resolver_match.url_name == 'teacher-collecting-groups' %}active{% endif %}" href="{% url 'teacher-collecting-groups' %}">Yig'ilayotgan guruhlar</a>
            <a class="nav-item {% if request.resolver_match.url_name == 'teacher-profile' %}active{% endif %}" href="{% url 'teacher-profile' %}">Profil</a>
        </nav>
    </aside>
    <main class="teacher-main">
        {% block content %}{% endblock content %}
    </main>
</div>
</body>
</html>
