{% extends "students/base_student.html" %}
{% block title %}Bosh sahifa{% endblock %}
{% block content %}
<h1>Kumushlar: <span class="stat-big">{{ total_kumush }}</span></h1>
<div class="grid-2">
  <div class="card">
    <p>Bosqich: <strong>{{ level }}</strong></p>
    <div class="progress-bar"><span style="width: {% widthratio total_xp next_level_xp 100 %}%"></span></div>
    <p class="muted">{{ total_xp }} / {{ next_level_xp }}</p>
    <p>XP: <strong>{{ total_xp }}</strong></p>
    <hr style="border-color: var(--border); margin: 1rem 0;">
    <h3>Reyting</h3>
    <p>Umumiy: <strong>{{ overall_rank }}</strong> - o'rin</p>
  </div>
</div>
{% endblock %}
